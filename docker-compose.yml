# Caddy como proxy HTTPS para Supabase
# Supabase se levanta con ./scripts/deploy-supabase.sh

name: caddy-proxy

services:
  # ---------- Caddy (HTTPS: supabase2.chocronbrokers.com) ----------
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "${HTTPS_PORT:-443}:443"
      - "80:80"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./volumes/caddy_data:/data
      - ./volumes/caddy_config:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - caddy_net

networks:
  caddy_net:
    driver: bridge
